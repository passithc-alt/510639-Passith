<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจคแนะนำตัวของฉัน</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="profile-card" id="myCard">
        <div>
            <img class="profile-img" src="./img/510639.png" alt="">
        </div>

        <h1 id="greeting">สวัสดีครับ</h1>
        <h2 id="name">ผมชื่อ นายภัสสิษฐ์ ชัยธนะกุลมงคล</h2>
        <p id="bio">ยินดีที่ได้รู้จักครับ ตอนนี้กำลังศึกษาการเขียนเว็บพื้นฐาน HTML, CSS และ JavaScript อยู่ครับ</p>

        <button class="btn" id="magicBtn">ทักทาย</button>
    </div>

    <script>
        // เลือก Elements จาก HTML มาใช้งานใน JS
        const magicButton = document.getElementById('magicBtn');
        const profileCard = document.getElementById('myCard');
        const greetingText = document.getElementById('greeting');
        const nameText = document.getElementById('name');
        const bioText = document.getElementById('bio');

        // ใส่ฟังก์ชันเมื่อมีการคลิกปุ่ม
        magicButton.addEventListener('click', () => {
            // 1. เปลี่ยนข้อความทักทาย
            greetingText.innerText = "ฝากตัวด้วยนะครับ";
            nameText.innerText = "";
            bioText.innerText = "";

            // 2. สลับสีพื้นหลังของการ์ด (เพิ่ม/ลด class 'highlight')
            profileCard.classList.toggle('highlight');

            // 3. แสดงข้อความ Alert ทักทาย
            alert("ขอบคุณที่แวะมาทักทายกันนะครับ!");
        });
    </script>
</body>

</html>
