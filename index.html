<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจคแนะนำตัวของฉัน</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="profile-card" id="myCard">
        <button id="themeToggle" class="theme-btn">🌙 โหมดมืด</button>
        <div>
            <img class="profile-img" src="./img/510639.png" alt="">
        </div>

        <div class="like-container">
            <button id="likeBtn" class="like-btn">❤️</button>
            <span id="likeCount">0</span>
        </div>

        <h1 id="greeting"></h1>
        <h2 id="name"></h2>
        <h2 id="department"></h2>
        <p id="bio"></p>

        <button class="btn" id="mainButton">หน้าแรก</button>
        <button class="btn" id="magicBtn">ทักทาย</button>
        <button class="btn" id="buttonReason">เหตุผลที่เรียน</button>
        <div id="weather-box" style="margin: 15px 0; font-size: 14px; color: #555; font-weight: 500;">
            กำลังโหลดสภาพอากาศ...
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
