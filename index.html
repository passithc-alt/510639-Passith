<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจคแนะนำตัวของฉัน</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #ddd;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* คลาสที่จะใช้เปลี่ยนสีตอนกดปุ่มด้วย JS */
        .highlight {
            background-color: #e8f8f5;
        }
    </style>
</head>

<body>

    <div class="profile-card" id="myCard">
        <div class="avatar">👨‍💻</div>

        <h1 id="name">สวัสดีครับ! ผมชื่อ [ชื่อของคุณ]</h1>
        <p id="bio">ยินดีที่ได้รู้จักครับ ตอนนี้กำลังศึกษาการเขียนเว็บพื้นฐาน HTML, CSS และ JavaScript อยู่
            โปรเจคนี้เป็นเว็บแนะนำตัวแบบ Interactive เล็กๆ ครับ</p>

        <button class="btn" id="magicBtn">ทักทายฉันสิ!</button>
    </div>

    <script>
        // เลือก Elements จาก HTML มาใช้งานใน JS
        const magicButton = document.getElementById('magicBtn');
        const profileCard = document.getElementById('myCard');
        const nameText = document.getElementById('name');

        // ใส่ฟังก์ชันเมื่อมีการคลิกปุ่ม
        magicButton.addEventListener('click', () => {
            // 1. เปลี่ยนข้อความทักทาย
            nameText.innerText = "ยินดีต้อนรับสู่โปรฟายของฉัน! 🎉";

            // 2. สลับสีพื้นหลังของการ์ด (เพิ่ม/ลด class 'highlight')
            profileCard.classList.toggle('highlight');

            // 3. แสดงข้อความ Alert ทักทาย
            alert("ขอบคุณที่แวะมาทักทายกันนะครับ!");
        });
    </script>
</body>

</html>
